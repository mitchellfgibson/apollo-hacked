name: Strand
options:
  bundleIdPrefix: com.noopapp
  deploymentTarget:
    macOS: "13.0"
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "7.7.0"
    CURRENT_PROJECT_VERSION: "7"
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    # Build for both Apple Silicon and Intel so the release runs on every Mac.
    ARCHS: "$(ARCHS_STANDARD)"
  configs:
    Release:
      # Distribution builds must produce a universal binary, not just the host arch.
      ONLY_ACTIVE_ARCH: NO
packages:
  WhoopProtocol:
    path: Packages/WhoopProtocol
  WhoopStore:
    path: Packages/WhoopStore
  StrandAnalytics:
    path: Packages/StrandAnalytics
  StrandImport:
    path: Packages/StrandImport
  StrandDesign:
    path: Packages/StrandDesign
targets:
  Strand:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Strand
        excludes:
          - "Resources/Info.plist"
          - "Resources/Strand.entitlements"
          - "Resources/Fonts"          # added as a folder reference below so the Fonts/ subfolder
                                        # is preserved in the bundle (ATSApplicationFontsPath: Fonts)
      - path: Strand/Resources/Fonts
        type: folder
    info:
      path: Strand/Resources/Info.plist
      properties:
        CFBundleName: NOOP
        CFBundleDisplayName: NOOP
        LSMinimumSystemVersion: "13.0"
        LSApplicationCategoryType: public.app-category.healthcare-fitness
        NSBluetoothAlwaysUsageDescription: "NOOP connects directly to your WHOOP strap over Bluetooth to read heart rate, R-R intervals, battery, and sensor data locally on your Mac. Nothing leaves your device."
        # Bundled Noto Serif Display fonts (see Strand/Resources/Fonts). macOS loads them
        # from this bundle-relative folder at launch so Font.custom("NotoSerifDisplay-*") resolves.
        ATSApplicationFontsPath: Fonts
    entitlements:
      path: Strand/Resources/Strand.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.device.bluetooth: true
        com.apple.security.files.user-selected.read-write: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.noopapp.noop
        PRODUCT_NAME: NOOP
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        # Hardened Runtime closes the DYLD_INSERT_LIBRARIES injection vector for the
        # distributed (ad-hoc) build. The app uses no JIT / unsigned-exec memory, so it's safe.
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - package: WhoopProtocol
      - package: WhoopStore
      - package: StrandAnalytics
      - package: StrandImport
      - package: StrandDesign
  StrandiOS:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    # Same app sources as macOS; platform-specific code is guarded with #if os(macOS) /
    # #if canImport(AppKit), so the desktop-only features (menu bar, Mac automations,
    # Mac-app notification mirroring) compile out and the core WHOOP experience remains.
    sources:
      - path: Strand
        excludes:
          - "Resources/Info.plist"
          - "Resources/Strand.entitlements"
          - "Resources/StrandiOS-Info.plist"
          - "Resources/Fonts"
      - path: Strand/Resources/Fonts
        type: folder
    info:
      path: Strand/Resources/StrandiOS-Info.plist
      properties:
        CFBundleName: NOOP
        CFBundleDisplayName: NOOP
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UIUserInterfaceStyle: Dark
        # iPhone-only, portrait. The strap is always with the phone, so offload happens in the
        # background whenever they're in range — including catching up on 6+ days of buffered history.
        UIDeviceFamily: [1]
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        # Bundled Noto Serif Display fonts so Font.custom("NotoSerifDisplay-*") resolves on iOS.
        UIAppFonts:
          - NotoSerifDisplay-Regular.ttf
          - NotoSerifDisplay-Bold.ttf
        # CoreBluetooth: connect to the strap and keep syncing history in the background.
        NSBluetoothAlwaysUsageDescription: "NOOP connects directly to your WHOOP strap over Bluetooth to read heart rate, R-R intervals, battery, and sensor data locally on your iPhone. Nothing leaves your device."
        UIBackgroundModes: [bluetooth-central]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mitchellgibson.noop
        PRODUCT_NAME: NOOP
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        # Sideload-friendly: no team baked in, automatic signing filled in by whoever builds it.
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: WhoopProtocol
      - package: WhoopStore
      - package: StrandAnalytics
      - package: StrandImport
      - package: StrandDesign
  StrandTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - StrandTests
    dependencies:
      - target: Strand
      - package: WhoopProtocol
      - package: WhoopStore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.noopapp.strandtests
